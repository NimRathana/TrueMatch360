
services:
  api:
    build:
      context: ./truematch360_api
      dockerfile: Dockerfile
    env_file:
      - .env.dev
    ports:
      - "8001:8000"   # host:container (standard local dev)
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - backend

  db:
    image: postgres:15
    container_name: truematch_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"   # local port 5433 → container 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend

  admin:
    build:
      context: ./truematch360_web
      dockerfile: Dockerfile
    ports:
      - "3001:80"   # nginx port 80
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge